<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostAce Chat Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { 
            margin: 0; padding: 0; height: 100vh; 
            background: #e5ddd5; background-size: cover; background-position: center;
            display: flex; flex-direction: column; transition: 0.5s;
        }
        #chat-header { 
            background: #075e54; color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        #message-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 10px;
        }
        .message { 
            max-width: 80%; padding: 10px; border-radius: 10px; 
            position: relative; word-wrap: break-word;
        }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        
        /* ၁။ Timestamp Style */
        .timestamp { 
            font-size: 0.65rem; color: #888; display: block; 
            margin-top: 4px; text-align: right; 
        }
        
        #input-area { 
            background: #f0f0f0; padding: 10px; display: flex; gap: 10px; 
        }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-header">
    <strong>GhostAce Chat</strong>
    <div>
        <input type="file" id="wp-input" style="display:none" accept="image/*">
        <button onclick="document.getElementById('wp-input').click()">🖼️</button>
        <button onclick="logout()" style="background:#cc0000; font-size: 10px;">Logout</button>
    </div>
</div>

<div id="message-container"></div>

<div id="input-area">
    <input type="text" id="msg-input" placeholder="စာရိုက်ပါ...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // မင်းပေးထားတဲ့ Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB_IdBe27bNVBOh_cBlC-BRQrHdwHrznpE",
        authDomain: "demon-chat-20361.firebaseapp.com",
        databaseURL: "https://demon-chat-20361-default-rtdb.firebaseio.com",
        projectId: "demon-chat-20361",
        storageBucket: "demon-chat-20361.firebasestorage.app",
        messagingSenderId: "563979701938",
        appId: "1:563979701938:web:36a01ceb134f3e624ec3ab"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ၃။ Notification ခွင့်ပြုချက်တောင်းခြင်း
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    // Wallpaper ပြန်ဖော်ခြင်း
    const savedWp = localStorage.getItem('chat_bg');
    if (savedWp) document.body.style.backgroundImage = `url(${savedWp})`;

    document.getElementById('wp-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => {
            document.body.style.backgroundImage = `url(${reader.result})`;
            localStorage.setItem('chat_bg', reader.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // စာပို့ခြင်း (Timestamp ပါဝင်သည်)
    function sendMessage() {
        const user = auth.currentUser;
        const text = document.getElementById('msg-input').value;
        if (user && text.trim() !== "") {
            const now = new Date();
            const time = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            db.ref('messages').push({
                sender: user.email,
                text: text,
                time: time
            });
            document.getElementById('msg-input').value = "";
        } else if (!user) {
            alert("ကျေးဇူးပြု၍ အရင် Login ဝင်ပါ");
        }
    }

    // စာများပြသခြင်းနှင့် Notification လွှတ်ခြင်း
    db.ref('messages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('message-container');
        const isMe = auth.currentUser && data.sender === auth.currentUser.email;

        const msgHtml = `
            <div class="message ${isMe ? 'sent' : 'received'}">
                <small style="font-size: 0.6rem; color: #075e54;">${data.sender}</small><br>
                ${data.text}
                <span class="timestamp">${data.time || ''}</span>
            </div>
        `;
        container.innerHTML += msgHtml;
        container.scrollTop = container.scrollHeight;

        // Notification (ကိုယ်တိုင်ပို့တာမဟုတ်လျှင်)
        if (!isMe && document.hidden) {
            new Notification("Message from " + data.sender, { body: data.text });
        }
    });

    function logout() { auth.signOut().then(() => location.reload()); }

    // အလိုအလျောက် Login စစ်ဆေးခြင်း
    auth.onAuthStateChanged(user => {
        if (!user) {
            const email = prompt("Email ရိုက်ပါ:");
            const pass = prompt("Password ရိုက်ပါ:");
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        }
    });
</script>
</body>
</html>
