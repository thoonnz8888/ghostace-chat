<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AÜRÖ HUB</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        /* CSS ကို Code ထဲမှာပဲ တိုက်ရိုက်ထည့်လိုက်ပါပြီ */
        :root { --danger: #ff3b30; --dark: #1c1c1e; --bg: #f2f2f7; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { margin: 0; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .screen { height: 100vh; width: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex !important; }

        /* Login Box Style */
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
        
        input { width: 100%; padding: 15px 20px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #ddd; outline: none; font-size: 16px; background: #fafafa; }
        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--dark); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Chat Layout */
        #chat-scr { justify-content: flex-start; padding: 0; }
        .header { width: 100%; background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; }
        #msg-flow { flex: 1; width: 100%; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .sent { background: var(--dark); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .recv { background: white; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Input Bar */
        .input-bar { width: 100%; background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .msg-in { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background: #f2f2f7; outline: none; }
        
        /* Warning */
        .warning-msg { background: #fff0f0; border: 2px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 15px; margin: 10px; text-align: center; font-weight: bold; width: 90%; }
        
        /* Admin Panel */
        #admin-panel { position: fixed; top: 0; width: 100%; height: 80vh; background: white; z-index: 100; display: none; padding: 20px; border-radius: 0 0 30px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow-y: auto; }
        .user-card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-sm { padding: 8px 15px; border-radius: 10px; border: none; font-size: 12px; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div id="login-scr" class="screen active">
    <div class="login-card">
        <h1>AÜRÖ HUB</h1>
        <input type="text" id="uName" placeholder="Username">
        <input type="tel" id="uPh" placeholder="Phone Number">
        <button class="btn-main" onclick="login()">GO TO HUB</button>
    </div>
</div>

<div id="wait-scr" class="screen">
    <div style="text-align:center;">
        <div style="width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <h3 style="font-weight: 800;">AWAITING ADMIN</h3>
    </div>
</div>

<div id="chat-scr" class="screen">
    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0;">COMMANDER</h3>
            <button onclick="toggleAdmin()" style="border:none; background:none; font-size:20px;">✕</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="pfp" style="width:35px; height:35px; background:black; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
            <div style="font-weight:bold;">AÜRÖ HUB</div>
        </div>
        <button id="admin-btn" onclick="toggleAdmin()" style="display:none; background:none; border:none; font-size:20px;">🛡️</button>
    </div>

    <div id="msg-flow"></div>

    <div class="input-bar">
        <input type="text" id="msg-box" class="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') sendTxt()">
        <button onclick="sendTxt()" style="background:black; color:white; border:none; width:45px; height:45px; border-radius:50%; font-size:20px;">↑</button>
    </div>
</div>

<div id="block-scr" class="screen">
    <h1 style="color:red;">SERVER BANNED</h1>
    <p>စည်းကမ်းဖောက်ဖျက်၍ ပိတ်ပင်ခံရသည်။</p>
</div>

<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

<script>
    const ADMIN_PH = "09672264454";
    let myName = "", myPhone = "", isAdmin = false;
    let users = new Map();

    const TOXIC = ["စောက်", "လိုး", "မင်းမေ", "ဖာ", "လီး", "ကောင်မ", "ငပိ", "ဂျင်း", "နွား", "ခွေး", "ပြည့်တန်ဆာ", "အမေလိုး", "နှမလိုး", "မအေလိုး", "ဖင်", "စောက်ပတ်", "လီးပဲ", "စောက်ရမ်း", "သေနာ", "ဂျပိုး", "မအေဘေး", "မအေလိုးမ", "နှမလိုးမ", "ဖင်လိုး", "ဖင်ခံ", "ဖာသည်", "ဖာခေါင်း", "ဖာမ", "လိုးမ", "လိုးပဲ", "စောက်ဖုတ်", "စောက်ထိုး", "စောက်ရူး", "စောက်တုံး"];

    const ably = new Ably.Realtime({ key: 'Nt4BVQ.HoIzUA:eXv4-B4_uJx-0PmEN1WDOQ4KMjreeEUe2_G6F5VObd8' });
    const channel = ably.channels.get('auro_v12_vercel');

    function switchScr(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    channel.subscribe('control_v12', (m) => {
        if(m.data.target === myPhone) {
            if(m.data.action === 'allow') launch();
            if(m.data.action === 'block') switchScr('block-scr');
        }
    });

    function login() {
        myName = document.getElementById('uName').value.trim();
        myPhone = document.getElementById('uPh').value.trim();
        if(!myName || !myPhone) return;

        if(myPhone === ADMIN_PH) { isAdmin = true; document.getElementById('admin-btn').style.display='block'; launch(); }
        else { switchScr('wait-scr'); channel.publish('join_req_v12', { name: myName, phone: myPhone }); }
    }

    function launch() {
        switchScr('chat-scr');
        document.getElementById('pfp').innerText = myName[0].toUpperCase();
        channel.subscribe('chat_v12', (m) => render(m.data));
        if(isAdmin) channel.subscribe('join_req_v12', (m) => { users.set(m.data.phone, m.data.name); updateAdminUI(); });
    }

    function updateAdminUI() {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach((name, ph) => {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `<div><b>${name}</b><br><small>${ph}</small></div>
            <div><button class="btn-sm" style="background:black;" onclick="doCmd('${ph}', 'allow')">ALLOW</button>
            <button class="btn-sm" style="background:red; margin-left:5px;" onclick="doCmd('${ph}', 'block')">BLOCK</button></div>`;
            list.prepend(div);
        });
    }

    function doCmd(ph, act) { channel.publish('control_v12', { target: ph, action: act }); if(act==='block') { users.delete(ph); updateAdminUI(); } }

    function sendTxt() {
        let val = document.getElementById('msg-box').value;
        if(!val.trim()) return;
        if(!isAdmin && TOXIC.some(w => val.includes(w))) { channel.publish('control_v12', { target: myPhone, action: 'block' }); return; }
        let type = (isAdmin && val.startsWith('!')) ? 'warn' : 'txt';
        if(type === 'warn') val = val.substring(1);
        channel.publish('chat_v12', { user: myName, phone: myPhone, text: val, type: type, admin: isAdmin });
        document.getElementById('msg-box').value = '';
    }

    function render(data) {
        const flow = document.getElementById('msg-flow');
        const isMe = data.phone === myPhone;
        const div = document.createElement('div');
        if(data.type === 'warn') {
            div.className = 'warning-msg';
            div.innerHTML = `🛡️ ADMIN: ${data.text}`;
        } else {
            div.className = `bubble ${isMe ? 'sent' : 'recv'}`;
            div.innerHTML = `<small style="font-size:10px; display:block; margin-bottom:4px; opacity:0.6;">${data.user}</small>${data.text}`;
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
