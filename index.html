<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AÜRÖ HUB PREMIUM</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --accent: #007aff; --danger: #ff3b30; --glass: rgba(255, 255, 255, 0.8); }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: #000; background-image: radial-gradient(circle at top right, #1c1c1e, #000); height: 100vh; color: white; overflow: hidden; }
        
        /* Premium Header */
        .header { background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #333; padding-top: env(safe-area-inset-top); }
        
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        /* Premium Bubbles */
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.5; position: relative; animation: slideUp 0.3s ease; }
        .sent { background: linear-gradient(135deg, #007aff, #0051a8); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
        .recv { background: #2c2c2e; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-img { width: 100%; max-width: 280px; border-radius: 12px; margin-top: 8px; border: 0.5px solid #444; }

        /* System Messages */
        .welcome-note { align-self: center; font-size: 11px; color: #888; background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 50px; margin: 10px 0; border: 0.5px solid #333; }
        .warning-msg { background: rgba(255,59,48,0.15); border: 1px solid var(--danger); color: #ff6961; padding: 15px; border-radius: 18px; text-align: center; font-weight: bold; margin: 10px 0; }

        /* Premium Input */
        .input-area { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-top: 0.5px solid #333; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .msg-in { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #1c1c1e; color: white; outline: none; font-size: 15px; border: 1px solid #333; }
        .icon-btn { font-size: 24px; color: white; background: none; border: none; cursor: pointer; display: flex; align-items: center; }

        /* Admin Panel */
        #admin-dash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; padding: 40px 25px; }
        .u-card { background: #1c1c1e; padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 0.5px solid #333; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="admin-dash">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="margin:0; font-weight:900;">SECURITY HUB</h2>
        <button onclick="toggleAdmin()" style="color:white; background:#333; border:none; padding:10px 20px; border-radius:15px;">CLOSE</button>
    </div>
    <div id="request-list"></div>
</div>

<div id="ban-scr" style="display:none; height:100vh; background:black; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    <h1 style="font-size:100px; margin:0;">🚫</h1>
    <h2 style="color:red; font-weight:900;">ACCESS DENIED</h2>
    <p style="color:#888;">Your account has been blacklisted.</p>
</div>

<div id="login-scr" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:#1c1c1e; padding:45px 35px; border-radius:40px; width:100%; max-width:360px; text-align:center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        <h1 style="margin:0; font-weight:900; letter-spacing: -1px;">AÜRÖ HUB</h1>
        <p style="color:#666; font-size:12px; margin-bottom:30px; letter-spacing: 2px;">PREMIUM EDITION</p>
        <input type="text" id="uName" placeholder="Display Name" style="width:100%; padding:16px; margin-bottom:12px; border-radius:18px; border:1px solid #333; background:#000; color:white; outline:none;">
        <input type="tel" id="uPh" placeholder="Phone Number" style="width:100%; padding:16px; margin-bottom:20px; border-radius:18px; border:1px solid #333; background:#000; color:white; outline:none;">
        <button onclick="login()" style="width:100%; padding:16px; border-radius:18px; border:none; background:white; color:black; font-weight:900; cursor:pointer;">CONNECT</button>
    </div>
</div>

<div id="chat-scr" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:10px; height:10px; background:#34c759; border-radius:50%; box-shadow: 0 0 10px #34c759;"></div>
            <b style="font-size:17px; letter-spacing:1px;">AÜRÖ PREMIUM</b>
        </div>
        <button id="admin-btn" onclick="toggleAdmin()" style="display:none; border:none; background:none; font-size:22px;">🛡️</button>
    </div>
    
    <div id="msg-flow"></div>

    <div class="input-area">
        <label class="icon-btn">
            <span style="font-weight:300;">⊕</span>
            <input type="file" id="img-in" hidden accept="image/*" onchange="sendImg(this)">
        </label>
        <input type="text" id="msg-box" class="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') sendTxt()">
        <button onclick="sendTxt()" class="icon-btn" style="color:var(--accent);">➤</button>
    </div>
</div>

<script>
    const ADMIN_PH = "09672264454";
    const TOXIC = ["စောက်", "လိုး", "မင်းမေ", "ဖာ", "လီး", "မအေဘေး", "စောက်ပတ်", "လိုးပဲ", "မအေလိုး"];
    let myName = "", myPhone = "", isAdmin = false;
    let users = new Map();

    const ably = new Ably.Realtime({ key: 'Nt4BVQ.HoIzUA:eXv4-B4_uJx-0PmEN1WDOQ4KMjreeEUe2_G6F5VObd8' });
    const channel = ably.channels.get('auro_v14_premium');

    function toggleAdmin() {
        const d = document.getElementById('admin-dash');
        d.style.display = (d.style.display === 'block') ? 'none' : 'block';
    }

    function login() {
        myName = document.getElementById('uName').value.trim();
        myPhone = document.getElementById('uPh').value.trim();
        if(!myName || !myPhone) return;

        if(myPhone === ADMIN_PH) { isAdmin = true; startHub(); channel.publish('chat', { type: 'welcome', user: myName + " (Admin)" }); }
        else { document.getElementById('login-scr').innerHTML = "<h3 style='color:white'>AWAITING PREMIUM ACCESS...</h3>"; channel.publish('join_req', { name: myName, phone: myPhone }); }
    }

    channel.subscribe('control', (m) => {
        if(m.data.target === myPhone) {
            if(m.data.action === 'allow') { startHub(); channel.publish('chat', { type: 'welcome', user: myName }); }
            if(m.data.action === 'block') { document.body.innerHTML = document.getElementById('ban-scr').innerHTML; document.body.style.display='flex'; }
        }
    });

    function startHub() {
        document.getElementById('login-scr').style.display = 'none';
        document.getElementById('chat-scr').style.display = 'flex';
        if(isAdmin) document.getElementById('admin-btn').style.display = 'block';
        channel.subscribe('chat', (m) => render(m.data));
        if(isAdmin) channel.subscribe('join_req', (m) => { users.set(m.data.phone, m.data.name); updateAdminUI(); });
    }

    function updateAdminUI() {
        const list = document.getElementById('request-list');
        list.innerHTML = "";
        users.forEach((name, ph) => {
            list.innerHTML += `<div class="u-card"><div><b>${name}</b><br><small style="color:#666">${ph}</small></div>
            <div><button onclick="doAct('${ph}','allow')" style="background:white; color:black; border-radius:12px; border:none; padding:10px 15px; font-weight:bold;">ALLOW</button>
            <button onclick="doAct('${ph}','block')" style="background:red; color:white; border-radius:12px; border:none; padding:10px 15px; margin-left:8px;">BAN</button></div></div>`;
        });
    }

    function doAct(ph, act) { channel.publish('control', { target: ph, action: act }); if(act==='block') users.delete(ph); updateAdminUI(); }

    function sendTxt() {
        let val = document.getElementById('msg-box').value;
        if(!val.trim()) return;
        if(!isAdmin && TOXIC.some(w => val.includes(w))) { channel.publish('control', { target: myPhone, action: 'block' }); return; }
        let type = (isAdmin && val.startsWith('!')) ? 'warn' : 'txt';
        channel.publish('chat', { user: myName, phone: myPhone, text: (type==='warn'?val.substring(1):val), type: type, admin: isAdmin });
        document.getElementById('msg-box').value = '';
    }

    function sendImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX = 800;
                let w = img.width, h = img.height;
                if(w > MAX) { h *= MAX/w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                channel.publish('chat', { user: myName, phone: myPhone, img: canvas.toDataURL('image/jpeg', 0.6), type: 'img', admin: isAdmin });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function render(data) {
        const flow = document.getElementById('msg-flow');
        const isMe = data.phone === myPhone;
        const div = document.createElement('div');
        if(data.type === 'welcome') { div.className = 'welcome-note'; div.innerHTML = `✨ ${data.user.toUpperCase()} JOINED THE HUB`; } 
        else if(data.type === 'warn') { div.className = 'warning-msg'; div.innerHTML = `🛡️ SYSTEM ALERT<br><span style="font-weight:normal; font-size:14px;">${data.text}</span>`; } 
        else {
            div.className = `bubble ${isMe ? 'sent' : 'recv'}`;
            let content = (data.type === 'img') ? `<img src="${data.img}" class="chat-img" onclick="window.open(this.src)">` : data.text;
            div.innerHTML = `<small style="display:block; font-size:10px; font-weight:bold; opacity:0.5; margin-bottom:4px;">${data.user} ${data.admin?'🛡️':''}</small>${content}`;
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
